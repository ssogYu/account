name: account-prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: account-postgres
    restart: always
    env_file:
      - .env.production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - account-network

  minio:
    image: minio/minio:latest
    container_name: account-minio
    restart: always
    command: server /data --console-address ":9001"
    env_file:
      - .env.production
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - account-network

  server:
    build:
      context: ../server
      dockerfile: ../deploy/Dockerfile
    image: account-server:latest
    container_name: account-server
    restart: always
    env_file:
      - .env.production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - account-network

  nginx:
    image: nginx:1.27-alpine
    container_name: account-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      server:
        condition: service_healthy
    networks:
      - account-network

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  account-network:
    driver: bridge
